services:
  postgres:
    image: postgres:16-alpine
    container_name: cubs-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: cubs
      POSTGRES_PASSWORD: cubs_dev_password
      POSTGRES_DB: cubs_dev
    volumes:
      - cubs_pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: cubs-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  cubs_pgdata:
